apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-svc
  namespace: {{ .Values.appNamespace }}
  labels: 
    name: {{ .Values.appName }}-svc
    tier: {{ .Values.appTier }}
    context: {{ .Values.appContext }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.container.httpPort.port }}
    nodePort: {{ .Values.service.nodePort }}
  selector:
    app: {{ .Values.appName }}
    tier: {{ .Values.appTier }}
    context: {{ .Values.appContext }}